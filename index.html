<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>𝐁𝐎𝐓𝐀𝐓𝐎</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: #0a0a12;
      color: #eceaff;
      scroll-behavior: smooth;
      overflow-x: hidden;
      line-height: 1.5;
      cursor: pointer; 
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #191532, #05030f);
      z-index: -2;
    }
    
    .gradient-bg::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('Main background.jpg') no-repeat center center/cover;
      opacity: 0.22;
      mix-blend-mode: soft-light;
      pointer-events: none;
    }
    
    .gradient-bg::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(140, 80, 220, 0.25), transparent 70%);
      pointer-events: none;
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-radial-gradient(circle at 20% 30%, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 10px);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0rem 1.8rem 2rem 1.8rem;
      position: relative;
      z-index: 2;
    }

    .hero {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 85vh;
      padding: 1rem 0 0.5rem 0;
      margin-bottom: -0.5rem;
    }

    .hero-card {
      background: rgba(18, 15, 32, 0.5);
      backdrop-filter: blur(20px);
      border-radius: 3rem;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      border: 1px solid rgba(170, 120, 255, 0.5);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(200, 170, 255, 0.2), 0 0 28px rgba(140, 80, 255, 0.3);
      transition: all 0.4s ease;
      max-width: 580px;
      width: 100%;
      animation: gentleRise 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    
    @keyframes gentleRise {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar-ring {
      width: 150px;
      height: 150px;
      margin: 0 auto 1.2rem;
      position: relative;
      border-radius: 50%;
      background: linear-gradient(135deg, #b77eff, #7c3aed);
      padding: 4px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 18px rgba(156, 96, 255, 0.7), 0 12px 28px -5px black;
      animation: softGlowPulse 3s infinite alternate;
    }
    
    @keyframes softGlowPulse {
      0% { box-shadow: 0 0 8px rgba(156, 96, 255, 0.5), 0 12px 28px -5px black; }
      100% { box-shadow: 0 0 32px rgba(200, 140, 255, 1), 0 14px 32px -4px black; }
    }
    
    .avatar-ring:hover {
      transform: scale(1.03);
      box-shadow: 0 0 38px rgba(190, 130, 255, 1);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1c162e;
      position: relative;
      z-index: 2;
    }

    .avatar-bg-gif {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      opacity: 0.95;
      z-index: 1;
      filter: brightness(1.05) saturate(1.2);
      transition: opacity 0.2s;
    }

    .hero-card h1 {
      font-family: 'Space Grotesk', monospace;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(125deg, #f5efff, #dbbaff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .hero-tagline {
      font-size: 1rem;
      opacity: 0.85;
      letter-spacing: 1px;
      font-weight: 400;
      background: rgba(200, 170, 255, 0.15);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    .section-header {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }
    
    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 500;
      background: rgba(140, 100, 220, 0.25);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      color: #d4bdff;
      margin-bottom: 0.6rem;
    }
    
    .section-header h2 {
      font-size: 2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffffff, #d5baff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .social-link {
      background: rgba(22, 20, 42, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 1.4rem;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: #e5defa;
      border: 1.5px solid rgba(130, 90, 210, 0.4);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      position: relative;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1), transform 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.1), border 0.2s, box-shadow 0.2s;
    }
    
    .social-link.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .social-link:hover {
      transform: translateY(-5px) scale(1.01);
      background: rgba(42, 32, 75, 0.9);
      border-color: #e0b2ff;
      box-shadow: 0 0 16px rgba(180, 120, 255, 0.7), 0 10px 20px -8px black;
    }

    .social-icon {
      font-size: 1.8rem;
      min-width: 46px;
      text-align: center;
      color: #d6b3ff;
    }

    .social-details {
      flex: 1;
    }

    .social-details h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .social-note {
      font-size: 0.7rem;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .golden-badge {
      background: linear-gradient(125deg, #fcef9e, #e6c45a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 500;
    }

    .fav-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    
    .fav-card {
      background: rgba(18, 15, 36, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 0.9rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border: 1.5px solid rgba(150, 100, 240, 0.5);
      transition: all 0.3s ease;
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: translateY(20px) rotateX(2deg);
      transition: opacity 0.55s cubic-bezier(0.2, 0.85, 0.4, 1), transform 0.55s cubic-bezier(0.2, 0.85, 0.4, 1), box-shadow 0.2s, border 0.2s;
    }
    
    .fav-card.revealed {
      opacity: 1;
      transform: translateY(0) rotateX(0deg);
    }
    
    .fav-card:hover {
      background: rgba(35, 28, 65, 0.9);
      transform: translateX(8px) scale(1.01);
      border-color: #e3bdff;
      box-shadow: 0 0 20px rgba(170, 110, 255, 0.65), 0 14px 24px -12px rgba(0,0,0,0.5);
    }
    
    .anime-thumb {
      width: 75px;
      height: 75px;
      border-radius: 1.2rem;
      object-fit: cover;
      box-shadow: 0 8px 16px -5px rgba(0,0,0,0.5);
      border: 1px solid rgba(200, 160, 255, 0.6);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    
    .fav-card:hover .anime-thumb {
      transform: scale(1.05);
      box-shadow: 0 12px 22px -6px black;
      border-color: #ffd6ff;
    }
    
    .fav-rank {
      font-family: 'Space Grotesk', monospace;
      font-size: 2rem;
      font-weight: 700;
      min-width: 60px;
      text-align: center;
      background: linear-gradient(145deg, #e7d5ff, #bc91ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .fav-info {
      flex: 2;
      min-width: 160px;
    }
    
    .fav-info h3 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    
    .fav-stats {
      display: flex;
      gap: 1rem;
      margin-top: 5px;
      font-size: 0.7rem;
      opacity: 0.8;
      flex-wrap: wrap;
    }
    
    .fav-stats span i {
      margin-right: 4px;
      font-size: 0.65rem;
      color: #c8a2ff;
    }
    
    .rating-pill {
      background: rgba(110, 70, 190, 0.4);
      border-radius: 40px;
      padding: 0.2rem 0.9rem;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(4px);
      margin-top: 6px;
      border: 0.5px solid rgba(200, 160, 255, 0.4);
    }
    
    .rating-pill i {
      font-size: 0.65rem;
      color: #ffdf80;
    }
    
    .quote-vibe {
      margin-left: auto;
      font-size: 0.75rem;
      opacity: 0.8;
      background: rgba(80, 50, 150, 0.3);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      font-style: italic;
    }
    
    footer {
      text-align: center;
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(140, 100, 220, 0.35);
      font-size: 0.7rem;
      opacity: 0.65;
    }
    
    .music-fixed-wrapper {
      position: fixed;
      bottom: 28px;
      left: 28px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }
    
    .music-toggle-btn {
      width: 52px;
      height: 52px;
      background: rgba(25, 20, 48, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      border: 1.5px solid rgba(170, 120, 255, 0.7);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), 0 0 12px rgba(156, 96, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      color: #e2d6ff;
      font-size: 1.5rem;
      z-index: 1002;
      pointer-events: auto;
    }
    
    .music-toggle-btn:hover {
      transform: scale(1.08);
      background: rgba(42, 32, 85, 0.95);
      border-color: #e9c2ff;
      box-shadow: 0 0 22px rgba(200, 130, 255, 0.8);
      color: white;
    }
    
    .music-float {
      background: rgba(18, 14, 36, 0.92);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(170, 120, 255, 0.55);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(210, 170, 255, 0.2), 0 0 28px rgba(120, 70, 220, 0.3);
      transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
      visibility: visible;
    }
    
    .music-float.hidden {
      opacity: 0;
      transform: translateX(-40px);
      pointer-events: none;
      visibility: hidden;
    }
    
    .music-player-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .player-avatar {
      background: linear-gradient(135deg, #a06eff, #673ab7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(160, 110, 255, 0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .player-avatar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(190, 130, 255, 0.9);
    }
    
    .player-avatar i {
      color: white;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    
    .track-name {
      font-weight: 700;
      letter-spacing: -0.2px;
      background: linear-gradient(120deg, #f0eaff, #dbb6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .track-artist {
      font-size: 0.7rem;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .controls-group {
      background: rgba(0, 0, 0, 0.28);
      border-radius: 80px;
      backdrop-filter: blur(4px);
    }
    
    .ctrl-btn {
      background: transparent;
      border: none;
      color: #e5d9ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      border-radius: 40px;
    }
    
    .ctrl-btn:hover {
      color: #fff;
      background: rgba(180, 130, 255, 0.35);
      transform: scale(1.08);
      text-shadow: 0 0 6px #ceaaff;
    }
    
    .progress-bar-bg {
      background: rgba(210, 180, 255, 0.3);
      border-radius: 20px;
      cursor: pointer;
      overflow: hidden;
      transition: background 0.2s;
    }
    
    .progress-bar-bg:hover {
      background: rgba(210, 180, 255, 0.5);
    }
    
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #cb9eff, #f0ceff);
      border-radius: 20px;
      box-shadow: 0 0 6px #dbb2ff;
    }
    
    .time-current, .time-duration {
      font-family: 'Space Grotesk', monospace;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.85;
    }
    
    .volume-slider-compact {
      -webkit-appearance: none;
      background: rgba(210, 180, 255, 0.5);
      border-radius: 20px;
      cursor: pointer;
    }
    
    .volume-slider-compact::-webkit-slider-thumb {
      -webkit-appearance: none;
      border-radius: 50%;
      background: #e9ccff;
      box-shadow: 0 0 6px #c48eff;
      cursor: pointer;
      transition: 0.1s;
    }
    
    .volume-slider-compact::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: white;
    }
    
    @media (min-width: 781px) {
      .music-float {
        border-radius: 80px;
        max-width: 640px;
      }
      .music-player-inner {
        padding: 10px 24px 10px 20px;
        flex-wrap: wrap;
      }
      .player-avatar {
        width: 52px;
        height: 52px;
      }
      .player-avatar i {
        font-size: 1.8rem;
      }
      .player-info {
        min-width: 130px;
      }
      .track-name {
        font-size: 1rem;
        white-space: nowrap;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .track-artist {
        font-size: 0.72rem;
      }
      .controls-group {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 6px 18px 6px 16px;
      }
      .player-controls {
        display: flex;
        gap: 8px;
      }
      .ctrl-btn {
        width: 34px;
        height: 34px;
        font-size: 1.1rem;
      }
      .progress-area {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .time-current, .time-duration {
        font-size: 0.75rem;
        min-width: 42px;
      }
      .progress-bar-bg {
        width: 130px;
        height: 5px;
      }
      .volume-inline {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.25);
        padding: 4px 14px 4px 12px;
        border-radius: 50px;
      }
      .volume-inline i {
        font-size: 0.9rem;
        color: #dbbaff;
      }
      .volume-slider-compact {
        width: 85px;
        height: 4px;
      }
    }
    
    @media (max-width: 780px) {
      .music-fixed-wrapper {
        bottom: 20px;
        left: 20px;
        gap: 10px;
      }
      .music-toggle-btn {
        width: 46px;
        height: 46px;
        font-size: 1.3rem;
      }
      .music-float {
        border-radius: 60px;
        max-width: 360px;
        min-width: 300px;
      }
      .music-player-inner {
        padding: 6px 12px;
        gap: 8px;
        flex-wrap: nowrap;
        width: 100%;
      }
      .player-avatar {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
      }
      .player-avatar i {
        font-size: 1.3rem;
      }
      .player-info {
        min-width: 70px;
        flex-shrink: 1;
        overflow: hidden;
      }
      .track-name {
        font-size: 0.75rem;
        max-width: 75px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .track-artist {
        font-size: 0.55rem;
        white-space: nowrap;
      }
      .controls-group {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        flex-shrink: 1;
        min-width: 0;
      }
      .player-controls {
        display: flex;
        gap: 3px;
        flex-shrink: 0;
      }
      .ctrl-btn {
        width: 28px;
        height: 28px;
        font-size: 0.85rem;
        flex-shrink: 0;
      }
      .progress-area {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 1;
        min-width: 90px;
      }
      .time-current, .time-duration {
        font-size: 0.6rem;
        min-width: 30px;
        text-align: center;
        flex-shrink: 0;
      }
      .progress-bar-bg {
        width: 70px;
        height: 3px;
        flex-shrink: 1;
      }
      .volume-inline {
        display: none;
      }
      .container {
        padding: 0rem 1rem 1.5rem 1rem;
      }
      .hero {
        min-height: 70vh;
      }
      .quote-vibe {
        white-space: normal;
        font-size: 0.7rem;
        margin-top: 8px;
        width: 100%;
        text-align: center;
      }
      .fav-card {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .anime-thumb {
        width: 65px;
        height: 65px;
      }
      .fav-rank {
        min-width: 45px;
        font-size: 1.7rem;
      }
      .hero-card h1 {
        font-size: 2rem;
      }
      .avatar-ring {
        width: 120px;
        height: 120px;
      }
    }
    
    @media (max-width: 480px) {
      .music-float {
        max-width: 320px;
        min-width: 280px;
      }
      .controls-group {
        gap: 4px;
        padding: 3px 8px;
      }
      .progress-area {
        gap: 3px;
        min-width: 80px;
      }
      .progress-bar-bg {
        width: 55px;
      }
      .time-current, .time-duration {
        min-width: 26px;
        font-size: 0.55rem;
      }
      .player-info {
        min-width: 60px;
      }
      .track-name {
        max-width: 65px;
        font-size: 0.7rem;
      }
      .fav-card {
        flex-direction: column;
        text-align: center;
        align-items: center;
      }
      .anime-thumb {
        width: 90px;
        height: 90px;
      }
      .quote-vibe {
        margin-left: 0;
      }
    }
    
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #0f0d1c;
    }
    ::-webkit-scrollbar-thumb {
      background: #b27af0;
      border-radius: 20px;
    }
    
    .hero-card:hover {
      border-color: #dbb2ff;
      box-shadow: 0 0 28px rgba(160, 100, 255, 0.6), 0 30px 50px -20px black;
    }

    .welcome-toast {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(25, 18, 48, 0.95);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(200, 150, 255, 0.8);
      border-radius: 60px;
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2000;
      box-shadow: 0 20px 35px -12px black, 0 0 0 1px rgba(210, 180, 255, 0.3);
      font-family: 'Space Grotesk', monospace;
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2), opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    .welcome-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .welcome-toast i {
      font-size: 1.8rem;
      color: #e3bcff;
      filter: drop-shadow(0 0 6px #b77eff);
    }
    .welcome-toast span {
      font-size: 1rem;
      font-weight: 500;
      background: linear-gradient(125deg, #f0e9ff, #d7b6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    @media (max-width: 640px) {
      .welcome-toast { padding: 0.6rem 1.2rem; white-space: nowrap; }
      .welcome-toast i { font-size: 1.3rem; }
      .welcome-toast span { font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="gradient-bg"></div>
<div class="noise"></div>

<div class="container">

    <div class="hero-card">
      <div class="avatar-ring">

        <img class="avatar-img" src="profile.jpg" alt="Botato" loading="eager">
      </div>
      <h1>ʙᴏᴛᴀᴛᴏ</h1>

    </div>
  </div>

  <div class="section-header" style="margin-top: 0.5rem;">
    <span class="section-label"><i class="fas fa-compass"></i>  𝐃𝐢𝐠𝐢𝐭𝐚𝐥 𝐑𝐨𝐨𝐭𝐬</span>
    <h2>𝓜𝔂 𝓐𝓬𝓬𝓸𝓾𝓷𝓽𝓼</h2>
  </div>
  <div class="social-grid" id="socialGrid"></div>

  <div class="section-header">
    <span class="section-label"><i class="fas fa-scroll"></i>  𝐒𝐨𝐮𝐥 𝐂𝐢𝐧𝐞𝐦𝐚</span>
    <h2>𝚃𝚘𝚙 𝐕</h2>
  </div>
  <div class="fav-grid" id="favoritesList"></div>
  
  <footer>
    <i class="fas fa-feather-alt"></i> 𝐂𝐑𝐄𝐀𝐓𝐄𝐃 𝐁𝐘 𝐁𝐎𝐓𝐀𝐓𝐎 ❦
  </footer>
</div>

<div class="music-fixed-wrapper">
  <div class="music-toggle-btn" id="musicToggleBtn">
    <i class="fas fa-chevron-right" id="toggleIcon"></i>
  </div>
  <div class="music-float hidden" id="floatingMusicPlayer">
    <div class="music-player-inner">
      <div class="player-avatar"><i class="fas fa-music"></i></div>
      <div class="player-info">
        <div class="track-name" id="trackName">𝐿𝑒𝑡 𝐼𝑡 𝐻𝑎𝑝𝑝𝑒𝑛 ♫</div>
        <div class="track-artist"><i class="fas fa-moon"></i> BY · 𝗧𝗮𝗺𝗲 𝗜𝗺𝗽𝗮𝗹𝗮</div>
      </div>
      <div class="controls-group">
        <div class="player-controls">
          <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
          <button class="ctrl-btn" id="stopResetBtn"><i class="fas fa-stop"></i></button>
        </div>
        <div class="progress-area">
          <span class="time-current" id="currentTime">0:00</span>
          <div class="progress-bar-bg" id="progressBarBg"><div class="progress-fill" id="progressFill"></div></div>
          <span class="time-duration" id="durationTime">0:00</span>
        </div>
        <div class="volume-inline"><i class="fas fa-volume-up"></i><input type="range" id="volumeSliderCompact" class="volume-slider-compact" min="0" max="1" step="0.01" value="0.7"></div>
      </div>
    </div>
  </div>
</div>

<div id="welcomeToast" class="welcome-toast">
  <i class="fas fa-hand-sparkles"></i>
  <span>✨ Welcome to Botato's profile !✨</span>
</div>

<script>
  const socialAccounts = [
    { name: "Instagram", url: "https://www.instagram.com/_botato_/", icon: "fab fa-instagram", note: "always Active " },
    { name: "Discord", url: "https://www.discord.com/users/761599757310623765", icon: "fab fa-discord", note: "best chilling app" },
    { name: "Threads", url: "https://www.threads.com/@_botato_", icon: "fas fa-at", note: "useless" },
    { name: "TikTok", url: "https://www.tiktok.com/@pzlru", icon: "fab fa-tiktok", note: "brainrot" },
    { name: "Facebook", url: "https://web.facebook.com/botatosoooo/", icon: "fab fa-facebook", note: "i don't use it" },
    { name: "Pinterest", url: "https://www.pinterest.com/botato3", icon: "fab fa-pinterest", note: "love" },
    { name: "X", url: "https://x.com/_botatos_", icon: "fab fa-twitter", note: "thoughts and random stuff" },
    { name: "Github", url: "https://github.com/botato3", icon: "fab fa-github", note: "creative code", goldenExtra: "hobby projects ✨" },
    { name: "Reddit", url: "https://www.reddit.com/user/Connect-Swing-5067/", icon: "fab fa-reddit-alien", note: "cozy memes" },
    { name: "Chess", url: "https://www.chess.com/member/yassine1983", icon: "fas fa-chess-queen", note: "mindful game", goldenNote: "challenge me ♟️" }
  ];
  function buildSocialNote(acc) {
    let noteHtml = `<span class="social-note"><i class="fas fa-leaf" style="font-size:7px;"></i> ${acc.note}</span>`;
    if (acc.name === "Github") noteHtml += `<span class="social-note golden-badge"><i class="fas fa-star"></i> ${acc.goldenExtra}</span>`;
    if (acc.name === "Chess") noteHtml += `<span class="social-note golden-badge"><i class="fas fa-crown"></i> ${acc.goldenNote}</span>`;
    return noteHtml;
  }
  const socialGrid = document.getElementById('socialGrid');
  socialAccounts.forEach(acc => {
    const link = document.createElement('a');
    link.href = acc.url;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.className = "social-link";
    link.innerHTML = `<div class="social-icon"><i class="${acc.icon}"></i></div><div class="social-details"><h3>${acc.name}</h3>${buildSocialNote(acc)}</div>`;
    socialGrid.appendChild(link);
  });

  const animeFavorites = [
    { name: "Attack on Titan", rank: 1, genre: "Dark Fantasy · Epic", vibe: "monumental", rating: "9.2", comment: "freedom & sacrifice", image: "https://i.pinimg.com/736x/84/2a/52/842a52cf5a02f8dcd455190a41afb3a1.jpg" },
    { name: "Demon Slayer", rank: 2, genre: "Action · Supernatural", vibe: "emotional", rating: "8.9", comment: "boundless heart", image: "https://i.pinimg.com/1200x/05/a8/57/05a85759e1320870c98b98bda1f46a2d.jpg" },
    { name: "Vinland Saga", rank: 3, genre: "Historical · Seinen", vibe: "philosophical", rating: "9.0", comment: "a true warrior", image: "https://i.pinimg.com/1200x/13/7a/ae/137aae582bd8f0435424990b4894efa3.jpg" },
    { name: "Hunter x Hunter", rank: 4, genre: "Adventure · Shonen", vibe: "masterpiece", rating: "9.1", comment: "endless journey", image: "https://i.pinimg.com/736x/f8/a8/2d/f8a82dd2c77c75391252f7f5c6b128f2.jpg" },
    { name: "Death Note", rank: 5, genre: "Psychological · Thriller", vibe: "intense", rating: "9.0", comment: "moral maze", image: "https://i.pinimg.com/1200x/e9/1e/60/e91e60c64556eda64322ae485e1bccd5.jpg" }
  ];
  const favoritesContainer = document.getElementById('favoritesList');
  animeFavorites.forEach(anime => {
    const card = document.createElement('div');
    card.className = 'fav-card';
    let starDisplay = parseFloat(anime.rating) >= 9.1 ? '★★★★★' : (parseFloat(anime.rating) >= 8.8 ? '★★★★½' : '★★★★');
    card.innerHTML = `<div class="fav-rank">#${anime.rank}</div><img class="anime-thumb" src="${anime.image}" alt="${anime.name}" loading="lazy"><div class="fav-info"><h3>${anime.name}</h3><div class="fav-stats"><span><i class="fas fa-tag"></i> ${anime.genre}</span><span><i class="fas fa-waveform"></i> ${anime.vibe}</span></div><div class="rating-pill"><i class="fas fa-star"></i> ${anime.rating} · ${starDisplay}</div></div><div class="quote-vibe"><i class="fas fa-quote-left"></i> ${anime.comment}</div>`;
    favoritesContainer.appendChild(card);
  });

  const animatedElements = document.querySelectorAll('.social-link, .fav-card');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('revealed'); observer.unobserve(entry.target); } });
  }, { threshold: 0.15, rootMargin: "0px 0px -20px 0px" });
  animatedElements.forEach(el => observer.observe(el));
  window.addEventListener('load', () => {
    animatedElements.forEach(el => { const rect = el.getBoundingClientRect(); if (rect.top < window.innerHeight - 100) { el.classList.add('revealed'); observer.unobserve(el); } });
  });

  const audio = new Audio('music.mp3');
  audio.loop = false;       
  audio.volume = 0.7;
  let isPlaying = false;
  const LOOP_START_SEC = 5 * 60 + 5; 
  
  const playPauseBtn = document.getElementById('playPauseBtn');
  const stopResetBtn = document.getElementById('stopResetBtn');
  const volumeSlider = document.getElementById('volumeSliderCompact');
  const progressFill = document.getElementById('progressFill');
  const progressBarBg = document.getElementById('progressBarBg');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationTimeSpan = document.getElementById('durationTime');
  
  function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }
  
  function handleLoopCheck() {
    if (!audio.duration) return;
    if (audio.currentTime >= audio.duration - 0.05) {
      audio.currentTime = LOOP_START_SEC;
      if (isPlaying) audio.play().catch(e=>console.log("playback resume"));
      updateProgressDisplay();
    }
  }
  
  function updateProgressDisplay() {
    if (audio.duration) {
      let percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = `${percent}%`;
      currentTimeSpan.innerText = formatTime(audio.currentTime);
    }
  }
  
  audio.addEventListener('loadedmetadata', () => {
    durationTimeSpan.innerText = formatTime(audio.duration);
  });
  
  audio.addEventListener('timeupdate', () => {
    updateProgressDisplay();
    handleLoopCheck();
  });
  
  audio.addEventListener('ended', () => {
    audio.currentTime = LOOP_START_SEC;
    if (isPlaying) audio.play().catch(e=>console.log("auto-loop"));
    updateProgressDisplay();
  });
  
  function startMusic() {
    if (audio.paused && !isPlaying) {
      audio.currentTime = LOOP_START_SEC;
      audio.play().then(() => {
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
      }).catch(e => console.log("autoplay blocked, interaction needed"));
    } else if (!audio.paused && isPlaying) {
    } else if (audio.paused && isPlaying === false) {
      audio.currentTime = LOOP_START_SEC;
      audio.play().then(() => {
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
      }).catch(e => console.log("interaction needed"));
    }
  }
  
  function togglePlayPause() {
    if (isPlaying) {
      audio.pause();
      playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
      isPlaying = false;
    } else {
      if (audio.paused && (audio.currentTime === 0 || audio.currentTime >= audio.duration - 0.5)) {
        audio.currentTime = LOOP_START_SEC;
      }
      audio.play().catch(e => console.log("interaction needed"));
      playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
      isPlaying = true;
    }
  }
  
  function stopAndReset() {
    audio.pause();
    audio.currentTime = LOOP_START_SEC;
    isPlaying = false;
    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    updateProgressDisplay();
  }
  
  playPauseBtn.addEventListener('click', togglePlayPause);
  stopResetBtn.addEventListener('click', stopAndReset);
  if (volumeSlider) volumeSlider.addEventListener('input', (e) => { audio.volume = parseFloat(e.target.value); });
  progressBarBg.addEventListener('click', (e) => {
    const rect = progressBarBg.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    if (audio.duration) {
      let newTime = percent * audio.duration;
      audio.currentTime = newTime;
      updateProgressDisplay();
    }
  });
  
  audio.preload = "auto";
  audio.load();
  audio.onerror = () => { console.warn("music.mp3 not found"); document.getElementById('trackName').innerText = "∞ lofi drift"; };
  
  const musicPlayer = document.getElementById('floatingMusicPlayer');
  const toggleBtn = document.getElementById('musicToggleBtn');
  const toggleIcon = document.getElementById('toggleIcon');
  let playerVisible = false;
  toggleBtn.addEventListener('click', () => {
    playerVisible = !playerVisible;
    if (playerVisible) {
      musicPlayer.classList.remove('hidden');
      toggleIcon.classList.remove('fa-chevron-right');
      toggleIcon.classList.add('fa-chevron-left');
    } else {
      musicPlayer.classList.add('hidden');
      toggleIcon.classList.remove('fa-chevron-left');
      toggleIcon.classList.add('fa-chevron-right');
    }
  });
  
  const welcomeToast = document.getElementById('welcomeToast');
  let welcomeShown = false;
  let musicStartedByUser = false;
  
  function showWelcomeAndMusic() {
    if (!welcomeShown) {
      welcomeToast.classList.add('show');
      welcomeShown = true;
      setTimeout(() => {
        welcomeToast.classList.remove('show');
      }, 4000);
    }
    if (!musicStartedByUser) {
      startMusic();
      musicStartedByUser = true;
    }
  }
  
  document.body.addEventListener('click', (e) => {
    if (!musicStartedByUser) {
      showWelcomeAndMusic();
    }
  }, { once: false });
  
  window.addEventListener('load', () => {
    audio.currentTime = LOOP_START_SEC;
    updateProgressDisplay();
  });
  
  audio.addEventListener('canplaythrough', () => {
    if (!musicStartedByUser) audio.currentTime = LOOP_START_SEC;
  });
</script>
</body>
</html>
